version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: quiz-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quiz_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - quiz_pg_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: quiz-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/quiz_app?schema=public
      SESSION_SECRET: super-secret-change-me
      CLIENT_ORIGIN: http://localhost:3000
      API_BASE_PATH: /api/v1
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MINUTES: 15
      RATE_LIMIT_MAX_REQUESTS: 200
      AUTH_RATE_LIMIT_MAX_REQUESTS: 20
    ports:
      - "4000:4000"
    command: sh -c "npm run prisma:generate && npm run db:push && npm run db:seed && npm run start"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    container_name: quiz-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"

volumes:
  quiz_pg_data:
