openapi: 3.0.3
info:
  title: Quiz Platform API
  version: 1.0.0
  description: Session-based REST API for quiz app.
servers:
  - url: http://localhost:4000/api/v1
tags:
  - name: Auth
  - name: Quizzes
  - name: Attempts
  - name: Admin
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: qid
  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: API health
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "201":
          description: Created
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email/password
      responses:
        "200":
          description: Logged in
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Logged out
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Profile
        "401":
          description: Unauthorized
  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Generate reset token (email integration placeholder)
      responses:
        "200":
          description: Token generated
  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      responses:
        "200":
          description: Password reset
  /quizzes:
    get:
      tags: [Quizzes]
      summary: List published quizzes
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200":
          description: Quiz list
  /quizzes/{id}:
    get:
      tags: [Quizzes]
      summary: Get quiz details + leaderboard
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Quiz details
  /quizzes/{id}/start:
    post:
      tags: [Quizzes]
      summary: Start/resume a quiz attempt
      security:
        - sessionCookie: []
      responses:
        "201":
          description: Attempt ready
  /attempts/{id}:
    get:
      tags: [Attempts]
      security:
        - sessionCookie: []
      summary: Get attempt state for resume
      responses:
        "200":
          description: Attempt state
  /attempts/{id}/answer:
    post:
      tags: [Attempts]
      security:
        - sessionCookie: []
      summary: Save or update answer
      responses:
        "200":
          description: Answer saved
  /attempts/{id}/submit:
    post:
      tags: [Attempts]
      security:
        - sessionCookie: []
      summary: Submit attempt and compute score
      responses:
        "200":
          description: Submitted
  /attempts/{id}/result:
    get:
      tags: [Attempts]
      security:
        - sessionCookie: []
      summary: Get detailed result review
      responses:
        "200":
          description: Result with explanations
  /users/me/attempts:
    get:
      tags: [Attempts]
      security:
        - sessionCookie: []
      summary: List current user's attempt history
      responses:
        "200":
          description: Attempt history
  /admin/quizzes:
    get:
      tags: [Admin]
      security:
        - sessionCookie: []
      summary: List all quizzes (admin)
      responses:
        "200":
          description: Quiz list
    post:
      tags: [Admin]
      security:
        - sessionCookie: []
      summary: Create quiz
      responses:
        "201":
          description: Quiz created
  /admin/quizzes/{id}:
    get:
      tags: [Admin]
      security:
        - sessionCookie: []
      summary: Get quiz with questions (admin)
      responses:
        "200":
          description: Quiz details
    put:
      tags: [Admin]
      security:
        - sessionCookie: []
      summary: Update quiz
      responses:
        "200":
          description: Quiz updated
    delete:
      tags: [Admin]
      security:
        - sessionCookie: []
      summary: Soft-delete quiz
      responses:
        "200":
          description: Quiz deleted
  /admin/quizzes/{id}/questions:
    post:
      tags: [Admin]
      security:
        - sessionCookie: []
      summary: Create question under a quiz
      responses:
        "201":
          description: Question created
  /admin/questions/{id}:
    put:
      tags: [Admin]
      security:
        - sessionCookie: []
      summary: Update question
      responses:
        "200":
          description: Question updated
    delete:
      tags: [Admin]
      security:
        - sessionCookie: []
      summary: Delete question
      responses:
        "200":
          description: Question deleted
  /admin/analytics:
    get:
      tags: [Admin]
      security:
        - sessionCookie: []
      summary: Fetch admin dashboard analytics
      responses:
        "200":
          description: Analytics data
